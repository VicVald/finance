name: CI — Testes

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Rodar testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências (com dev)
        run: uv sync --frozen
        working-directory: .

      - name: Rodar testes
        env:
          # Valores fictícios para CI — testes unitários não precisam de serviços reais
          OPENROUTER_API_KEY: "ci-fake-key"
          JWT_SECRET_KEY: "ci-fake-jwt-secret"
          FERNET_SECRET_KEY: "9xgyXvwEFI-nXsfpjvZJ5LRHt7Qx_Ca297AuSb8HHDA="
          LANGSMITH_TRACING: "false"
          LANGSMITH_API_KEY: "ci-fake-ls-key"
          LANGSMITH_PROJECT: "Finance-CI"
          OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1"
          OPENROUTER_MODEL: "openai/gpt-oss-20b:free"
        run: uv run pytest src/tests/ -v --tb=short
